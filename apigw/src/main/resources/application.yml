server:
  port: ${SERVER_PORT:8083}

# Gateway is reactive (WebFlux); avoid conflict with transitive spring-boot-starter-web from observability-support
spring:
  main:
    web-application-type: reactive
  application:
    name: ${APP_NAME:apigw}
  cloud:
    gateway:
      routes:
        # Defaults: localhost for running apigw in IDEA with backends in docker-compose
        - id: customer
          uri: ${CUSTOMER_URI:http://localhost:8080}
          predicates:
            - Path=/api/v1/customers/**
        - id: fraud
          uri: ${FRAUD_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/fraud/**
        - id: notification
          uri: ${NOTIFICATION_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/notification/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
