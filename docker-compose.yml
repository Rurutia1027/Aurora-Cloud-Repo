services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./bin/init-postgres-dbs.sh:/docker-entrypoint-initdb.d/00_init_db.sh:ro
    networks:
      - aurora-net


  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - aurora-net


  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - aurora-net


  apigw:
    image: nanachi1027/aurora-apigw:latest
    container_name: apigw
    environment:
      SERVER_PORT: 8083
      CUSTOMER_URI: http://customer:8080
      FRAUD_URI: http://fraud:8081
      NOTIFICATION_URI: http://notification:8082
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: apigw
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_PROPAGATORS: tracecontext,baggage
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      - customer
      - fraud
      - notification
      - jaeger
    ports:
      - "8083:8083"
    networks:
      - aurora-net


  customer:
    image: nanachi1027/aurora-customer:latest
    container_name: customer
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/customer
      DB_USERNAME: admin
      DB_PASSWORD: admin
      RABBITMQ_ADDR: amqp://rabbitmq:5672
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: customer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      - postgres
      - rabbitmq
      - jaeger
    ports:
      - "8080:8080"
    networks:
      - aurora-net


  fraud:
    image: nanachi1027/aurora-fraud:latest
    container_name: fraud
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/fraud
      DB_USERNAME: admin
      DB_PASSWORD: admin
      RABBITMQ_ADDR: amqp://rabbitmq:5672
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: fraud
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      - postgres
      - rabbitmq
      - jaeger
    ports:
      - "8081:8081"
    networks:
      - aurora-net


  notification:
    image: nanachi1027/aurora-notification:latest
    container_name: notification
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/notification
      DB_USERNAME: admin
      DB_PASSWORD: admin
      RABBITMQ_ADDR: amqp://rabbitmq:5672
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: notification
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      - postgres
      - rabbitmq
      - jaeger
    ports:
      - "8082:8082"
    networks:
      - aurora-net


  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aurora-net


  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - aurora-net


  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
    depends_on:
      - loki
    networks:
      - aurora-net


  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - aurora-net


networks:
  aurora-net:
    driver: bridge


volumes:
  postgres-data:
  prometheus-data:
  grafana-data: