# Tracing: customer/fraud/notification use OpenTelemetry Java Agent.
# - If images are built from this repo's Dockerfiles, the agent is inside the image; the volume mount below is optional.
# - If using pre-built images without the agent, run once: ./bin/download-otel-agent.sh and keep the volume mount.
# Jaeger UI: http://localhost:16686. See docs/tracing-agent-docker.md.
services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      # Default database used by init scripts; application DBs are created by init script.
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./bin/init-postgres-dbs.sh:/docker-entrypoint-initdb.d/00_init_db.sh:ro
    networks:
      - aurora-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    networks:
      - aurora-net

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI only; OTLP now via otel-collector
    networks:
      - aurora-net

  # OTLP collector: receives traces + logs from apps; forwards traces to Jaeger, logs to Loki
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: otel-collector
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./config/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # health check
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O- http://localhost:13133/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      - jaeger
      - loki
    networks:
      - aurora-net

  apigw:
    image: nanachi1027/aurora-apigw:latest
    container_name: apigw
    environment:
      SERVER_PORT: 8083
      APP_NAME: apigw
      # Backend URIs (use service names on compose network; required so gateway can resolve customer/fraud/notification)
      CUSTOMER_URI: http://customer:8080
      FRAUD_URI: http://fraud:8081
      NOTIFICATION_URI: http://notification:8082
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: apigw
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      customer: { condition: service_started }
      fraud: { condition: service_started }
      notification: { condition: service_started }
      otel-collector: { condition: service_healthy }
    ports:
      - "8083:8083"
    networks:
      - aurora-net

  customer:
    image: nanachi1027/aurora-customer:latest
    container_name: customer
    environment:
      SERVER_PORT: 8080
      APP_NAME: customer
      DB_URL: jdbc:postgresql://postgres:5432/customer
      DB_USERNAME: admin
      DB_PASSWORD: admin
      RABBITMQ_ADDR: amqp://rabbitmq:5672
      FRAUD_SERVICE_URL: http://fraud:8081
      NOTIFICATION_SERVICE_URL: http://notification:8082
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: customer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      postgres: { condition: service_started }
      rabbitmq: { condition: service_started }
      otel-collector: { condition: service_healthy }
    ports:
      - "8080:8080"
    networks:
      - aurora-net

  fraud:
    image: nanachi1027/aurora-fraud:latest
    container_name: fraud
    environment:
      SERVER_PORT: 8081
      APP_NAME: fraud
      DB_URL: jdbc:postgresql://postgres:5432/fraud
      DB_USERNAME: admin
      DB_PASSWORD: admin
      RABBITMQ_ADDR: amqp://rabbitmq:5672
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: fraud
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      postgres: { condition: service_started }
      rabbitmq: { condition: service_started }
      otel-collector: { condition: service_healthy }
    ports:
      - "8081:8081"
    networks:
      - aurora-net

  notification:
    image: nanachi1027/aurora-notification:latest
    container_name: notification
    environment:
      SERVER_PORT: 8082
      APP_NAME: notification
      DB_URL: jdbc:postgresql://postgres:5432/notification
      DB_USERNAME: admin
      DB_PASSWORD: admin
      RABBITMQ_ADDR: amqp://rabbitmq:5672
      JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: notification
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_SAMPLER: parentbased_always_on
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
    volumes:
      - ./otel-agent/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    depends_on:
      postgres: { condition: service_started }
      rabbitmq: { condition: service_started }
      otel-collector: { condition: service_healthy }
    ports:
      - "8082:8082"
    networks:
      - aurora-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - customer
      - fraud
      - notification
    networks:
      - aurora-net

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - aurora-net

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - aurora-net

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
    depends_on:
      - loki
    networks:
      - aurora-net

networks:
  aurora-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  loki-data: