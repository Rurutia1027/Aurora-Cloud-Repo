# OpenTelemetry Collector: receive OTLP (traces + logs) from apps, export traces to Jaeger and logs to Loki.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    timeout: 2s

exporters:
  # Traces → Jaeger (existing all-in-one OTLP endpoint)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Logs → Loki (push API; trace_id/span_id in log body for correlation)
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    labels:
      resource:
        service.name: service_name

service:
  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp/jaeger ]
    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ loki ]
