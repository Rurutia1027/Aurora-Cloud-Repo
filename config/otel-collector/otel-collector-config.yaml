# OpenTelemetry Collector: receive OTLP (traces + logs) from apps, export traces to Jaeger and logs to Loki.
extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    timeout: 2s
  # Promote service.name to Loki label so Grafana can filter by service_name (e.g. {service_name="apigw"}).
  attributes/loki_labels:
    actions:
      - key: loki.resource.labels
        value: service.name
        action: insert

exporters:
  # Traces → Jaeger (existing all-in-one OTLP endpoint)
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Logs → Loki (push API; trace_id/span_id in log body for correlation).
  # Note: "labels" was removed in recent collector-contrib; resource attributes (e.g. service.name)
  # can be promoted to Loki labels via attribute hints in an attributes processor if needed.
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [attributes/loki_labels, batch]
      exporters: [loki]
