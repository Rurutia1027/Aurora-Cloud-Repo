# Prometheus config for docker-compose (see docs/plan.md §4.4)
# Scrapes Micrometer /actuator/prometheus from each Spring Boot service.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [ "localhost:9090" ]

  - job_name: customer
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "customer:8080" ]
        labels:
          service: customer

  - job_name: fraud
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "fraud:8081" ]
        labels:
          service: fraud

  - job_name: notification
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "notification:8082" ]
        labels:
          service: notification

  - job_name: apigw
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ "apigw:8083" ]
        labels:
          service: apigw
